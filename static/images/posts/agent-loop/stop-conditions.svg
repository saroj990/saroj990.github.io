<svg xmlns="http://www.w3.org/2000/svg" width="960" height="480" viewBox="0 0 960 480" role="img" aria-label="Stop conditions for an agent loop">
  <rect width="960" height="480" fill="#0f172a"/>
  <text x="480" y="42" text-anchor="middle" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">When should the loop stop?</text>
  <text x="480" y="70" text-anchor="middle" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13">Good agents are defined as much by exits as by actions</text>

  <rect x="40" y="100" width="210" height="150" rx="12" fill="#1e293b" stroke="#22c55e"/>
  <text x="145" y="140" text-anchor="middle" fill="#22c55e" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">Success</text>
  <text x="145" y="175" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="13">Done-criteria met</text>
  <text x="145" y="200" text-anchor="middle" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12">tests green, answer</text>
  <text x="145" y="220" text-anchor="middle" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12">verified, goal closed</text>

  <rect x="270" y="100" width="210" height="150" rx="12" fill="#1e293b" stroke="#f59e0b"/>
  <text x="375" y="140" text-anchor="middle" fill="#f59e0b" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">Budget</text>
  <text x="375" y="175" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="13">Max steps / tokens</text>
  <text x="375" y="200" text-anchor="middle" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12">time, cost, or tool</text>
  <text x="375" y="220" text-anchor="middle" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12">call limits hit</text>

  <rect x="500" y="100" width="210" height="150" rx="12" fill="#1e293b" stroke="#38bdf8"/>
  <text x="605" y="140" text-anchor="middle" fill="#38bdf8" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">Human</text>
  <text x="605" y="175" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="13">Needs approval</text>
  <text x="605" y="200" text-anchor="middle" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12">deploy, delete,</text>
  <text x="605" y="220" text-anchor="middle" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12">payment, ambiguity</text>

  <rect x="730" y="100" width="190" height="150" rx="12" fill="#1e293b" stroke="#f43f5e"/>
  <text x="825" y="140" text-anchor="middle" fill="#f43f5e" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">Hard fail</text>
  <text x="825" y="175" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="13">Policy / error</text>
  <text x="825" y="200" text-anchor="middle" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12">blocked tool, crash,</text>
  <text x="825" y="220" text-anchor="middle" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12">unrecoverable state</text>

  <rect x="40" y="290" width="880" height="150" rx="12" fill="#1e293b" stroke="#334155"/>
  <text x="60" y="330" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">Without exits, you do not have an agent - you have an infinite bill</text>
  <text x="60" y="365" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13">Cap steps. Cap tokens. Detect repeated identical tool calls. Require a clear done-check</text>
  <text x="60" y="390" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13">(run tests, ask the user, verify a checksum) instead of trusting the model saying "done."</text>
</svg>
