<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-label="One iteration of the agent loop in detail">
  <rect width="960" height="520" fill="#0f172a"/>
  <text x="480" y="42" text-anchor="middle" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">One iteration, dissected</text>
  <text x="480" y="70" text-anchor="middle" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13">What enters the model, what leaves, and who executes</text>

  <rect x="40" y="100" width="200" height="360" rx="12" fill="#1e293b" stroke="#38bdf8"/>
  <text x="140" y="135" text-anchor="middle" fill="#38bdf8" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">Context in</text>
  <text x="60" y="175" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="13">- system / rules</text>
  <text x="60" y="205" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="13">- user goal</text>
  <text x="60" y="235" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="13">- tool schemas</text>
  <text x="60" y="265" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="13">- prior trajectory</text>
  <text x="60" y="295" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="13">- last observation</text>
  <text x="60" y="325" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="13">- retrieved snippets</text>
  <text x="60" y="370" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12">Runtime assembles</text>
  <text x="60" y="390" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12">this every turn</text>

  <path d="M250 280 H310" stroke="#64748b" stroke-width="3"/>

  <rect x="320" y="160" width="200" height="240" rx="12" fill="#1e293b" stroke="#a78bfa"/>
  <text x="420" y="200" text-anchor="middle" fill="#a78bfa" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">LLM</text>
  <text x="420" y="235" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="13">proposes either:</text>
  <text x="420" y="275" text-anchor="middle" fill="#22c55e" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">tool call(s)</text>
  <text x="420" y="305" text-anchor="middle" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12">or</text>
  <text x="420" y="340" text-anchor="middle" fill="#f59e0b" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">final answer</text>

  <path d="M530 280 H590" stroke="#64748b" stroke-width="3"/>

  <rect x="600" y="100" width="320" height="360" rx="12" fill="#1e293b" stroke="#22c55e"/>
  <text x="760" y="135" text-anchor="middle" fill="#22c55e" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">Runtime</text>
  <text x="620" y="175" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="13">1. parse structured call</text>
  <text x="620" y="205" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="13">2. validate args / policy</text>
  <text x="620" y="235" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="13">3. execute tool</text>
  <text x="620" y="265" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="13">4. capture observation</text>
  <text x="620" y="295" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="13">5. append to transcript</text>
  <text x="620" y="325" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="13">6. check stop conditions</text>
  <text x="620" y="370" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12">Model never runs the tool.</text>
  <text x="620" y="390" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12">Your code does.</text>
</svg>
