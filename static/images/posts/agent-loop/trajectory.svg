<svg xmlns="http://www.w3.org/2000/svg" width="960" height="440" viewBox="0 0 960 440" role="img" aria-label="Trajectory grows across loop steps">
  <rect width="960" height="440" fill="#0f172a"/>
  <text x="480" y="42" text-anchor="middle" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Trajectory: the loop's working memory</text>
  <text x="480" y="70" text-anchor="middle" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13">Each step appends thought, action, and observation</text>

  <rect x="60" y="100" width="840" height="50" rx="8" fill="#1e293b" stroke="#6366f1"/>
  <text x="80" y="130" fill="#a5b4fc" font-family="Arial, Helvetica, sans-serif" font-size="14">Goal: Fix failing CI for auth middleware</text>

  <rect x="60" y="170" width="260" height="100" rx="8" fill="#1e293b" stroke="#38bdf8"/>
  <text x="80" y="200" fill="#38bdf8" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700">Step 1</text>
  <text x="80" y="225" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="12">Action: read CI log</text>
  <text x="80" y="245" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12">Obs: TypeError in jwt.ts</text>

  <rect x="350" y="170" width="260" height="100" rx="8" fill="#1e293b" stroke="#22c55e"/>
  <text x="370" y="200" fill="#22c55e" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700">Step 2</text>
  <text x="370" y="225" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="12">Action: open jwt.ts</text>
  <text x="370" y="245" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12">Obs: null userId at L42</text>

  <rect x="640" y="170" width="260" height="100" rx="8" fill="#1e293b" stroke="#f59e0b"/>
  <text x="660" y="200" fill="#f59e0b" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700">Step 3</text>
  <text x="660" y="225" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="12">Action: patch + run tests</text>
  <text x="660" y="245" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12">Obs: 12/12 passed</text>

  <rect x="60" y="300" width="840" height="100" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="80" y="335" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">Why this matters</text>
  <text x="80" y="365" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13">The model does not remember steps magically. The runtime re-sends the growing transcript</text>
  <text x="80" y="385" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13">each iteration - until context fills, then something must be compacted or dropped.</text>
</svg>
