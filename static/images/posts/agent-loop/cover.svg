<svg xmlns="http://www.w3.org/2000/svg" width="960" height="400" viewBox="0 0 960 400" role="img" aria-label="Agent loop cover: reason, act, observe, repeat">
  <rect width="960" height="400" fill="#0f172a"/>
  <text x="480" y="48" text-anchor="middle" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">The Agent Loop</text>
  <text x="480" y="78" text-anchor="middle" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="14">Reason - Act - Observe - until done</text>

  <circle cx="200" cy="220" r="70" fill="#1e293b" stroke="#38bdf8" stroke-width="3"/>
  <text x="200" y="215" text-anchor="middle" fill="#38bdf8" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Reason</text>
  <text x="200" y="238" text-anchor="middle" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12">decide next step</text>

  <path d="M275 220 H325" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>

  <circle cx="400" cy="220" r="70" fill="#1e293b" stroke="#22c55e" stroke-width="3"/>
  <text x="400" y="215" text-anchor="middle" fill="#22c55e" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Act</text>
  <text x="400" y="238" text-anchor="middle" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12">call a tool</text>

  <path d="M475 220 H525" stroke="#64748b" stroke-width="3"/>

  <circle cx="600" cy="220" r="70" fill="#1e293b" stroke="#f59e0b" stroke-width="3"/>
  <text x="600" y="215" text-anchor="middle" fill="#f59e0b" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Observe</text>
  <text x="600" y="238" text-anchor="middle" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12">read the result</text>

  <path d="M670 180 C740 120, 860 140, 860 220 C860 300, 740 320, 670 260" fill="none" stroke="#a78bfa" stroke-width="3" stroke-dasharray="6 4"/>
  <text x="820" y="210" text-anchor="middle" fill="#a78bfa" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700">repeat</text>

  <rect x="120" y="330" width="720" height="40" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="480" y="356" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="14">Stop when: goal met | budget hit | human takeover | policy block</text>
</svg>
