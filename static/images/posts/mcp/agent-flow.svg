<svg xmlns="http://www.w3.org/2000/svg" width="960" height="400" viewBox="0 0 960 400" role="img" aria-label="MCP tools become agent tools in the harness">
  <rect width="960" height="400" fill="#0f172a"/>
  <text x="480" y="42" text-anchor="middle" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">How agents use MCP as tools</text>
  <text x="480" y="72" text-anchor="middle" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="14">Discover, register, call - inside the same agent loop</text>

  <rect x="50" y="120" width="180" height="200" rx="12" fill="#1e293b" stroke="#38bdf8"/>
  <text x="140" y="175" text-anchor="middle" fill="#38bdf8" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">1. Connect</text>
  <text x="140" y="215" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="13">Host starts MCP</text>
  <text x="140" y="240" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="13">client sessions</text>

  <rect x="270" y="120" width="180" height="200" rx="12" fill="#1e293b" stroke="#a78bfa"/>
  <text x="360" y="175" text-anchor="middle" fill="#a78bfa" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">2. List tools</text>
  <text x="360" y="215" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="13">tools/list returns</text>
  <text x="360" y="240" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="13">names + schemas</text>

  <rect x="490" y="120" width="180" height="200" rx="12" fill="#1e293b" stroke="#f59e0b"/>
  <text x="580" y="175" text-anchor="middle" fill="#f59e0b" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">3. Expose</text>
  <text x="580" y="215" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="13">Harness merges into</text>
  <text x="580" y="240" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="13">model tool list</text>

  <rect x="710" y="120" width="200" height="200" rx="12" fill="#1e293b" stroke="#22c55e"/>
  <text x="810" y="175" text-anchor="middle" fill="#22c55e" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">4. Call</text>
  <text x="810" y="215" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="13">Model picks a tool;</text>
  <text x="810" y="240" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="13">tools/call runs it</text>
</svg>
