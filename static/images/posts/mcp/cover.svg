<svg xmlns="http://www.w3.org/2000/svg" width="960" height="400" viewBox="0 0 960 400" role="img" aria-label="MCP connects agents to tools like a standard plug">
  <rect width="960" height="400" fill="#0f172a"/>
  <text x="480" y="48" text-anchor="middle" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">Model Context Protocol</text>
  <text x="480" y="78" text-anchor="middle" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="15">A standard way for agents to discover and call tools</text>

  <rect x="60" y="130" width="200" height="200" rx="14" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="160" y="200" text-anchor="middle" fill="#a78bfa" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Agent / Host</text>
  <text x="160" y="235" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="14">Cursor, Claude,</text>
  <text x="160" y="260" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="14">custom runtime</text>

  <text x="300" y="235" text-anchor="middle" fill="#38bdf8" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">MCP</text>

  <rect x="360" y="130" width="200" height="200" rx="14" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <text x="460" y="200" text-anchor="middle" fill="#38bdf8" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">MCP Server</text>
  <text x="460" y="235" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="14">tools / resources</text>
  <text x="460" y="260" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="14">/ prompts</text>

  <text x="600" y="235" text-anchor="middle" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">-</text>

  <rect x="660" y="130" width="240" height="200" rx="14" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <text x="780" y="195" text-anchor="middle" fill="#22c55e" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Real systems</text>
  <text x="780" y="230" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="14">APIs, DBs, files,</text>
  <text x="780" y="255" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="14">Figma, GitHub...</text>
</svg>
