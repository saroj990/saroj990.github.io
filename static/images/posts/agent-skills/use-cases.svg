<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-label="Skill use cases mapped to blog topics">
  <rect width="960" height="520" fill="#0f172a"/>
  <text x="480" y="40" text-anchor="middle" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Skill ideas from these posts</text>

  <rect x="40" y="70" width="280" height="120" rx="10" fill="#1e293b" stroke="#38bdf8"/>
  <text x="60" y="105" fill="#38bdf8" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">LLMs / local runtimes</text>
  <text x="60" y="135" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="12">local-llm-ops skill</text>
  <text x="60" y="160" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12">Ollama / LM Studio workflows</text>

  <rect x="340" y="70" width="280" height="120" rx="10" fill="#1e293b" stroke="#a78bfa"/>
  <text x="360" y="105" fill="#a78bfa" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">AI agents</text>
  <text x="360" y="135" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="12">agent-design-checklist</text>
  <text x="360" y="160" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12">goal, tools, done-criteria</text>

  <rect x="640" y="70" width="280" height="120" rx="10" fill="#1e293b" stroke="#22c55e"/>
  <text x="660" y="105" fill="#22c55e" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">Agent loop</text>
  <text x="660" y="135" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="12">debug-agent-trajectory</text>
  <text x="660" y="160" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12">spot spinning / bad stops</text>

  <rect x="40" y="220" width="280" height="120" rx="10" fill="#1e293b" stroke="#f59e0b"/>
  <text x="60" y="255" fill="#f59e0b" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">Context windows</text>
  <text x="60" y="285" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="12">context-budget-hygiene</text>
  <text x="60" y="310" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12">handoffs, compaction, RAG</text>

  <rect x="340" y="220" width="280" height="120" rx="10" fill="#1e293b" stroke="#f43f5e"/>
  <text x="360" y="255" fill="#f43f5e" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">Tree shaking</text>
  <text x="360" y="285" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="12">bundle-export-audit</text>
  <text x="360" y="310" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12">ESM, sideEffects, barrels</text>

  <rect x="640" y="220" width="280" height="120" rx="10" fill="#1e293b" stroke="#2dd4bf"/>
  <text x="660" y="255" fill="#2dd4bf" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">Monorepos</text>
  <text x="660" y="285" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="12">monorepo-task-graph</text>
  <text x="660" y="310" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12">Nx / Turbo affected builds</text>

  <rect x="40" y="370" width="880" height="110" rx="10" fill="#1e293b" stroke="#334155"/>
  <text x="60" y="415" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">Pattern: one blog topic = one reusable skill</text>
  <text x="60" y="445" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13">Encode the checklist you would paste into chat every time - then let the agent load it on demand.</text>
