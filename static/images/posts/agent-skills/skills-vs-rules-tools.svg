<svg xmlns="http://www.w3.org/2000/svg" width="960" height="460" viewBox="0 0 960 460" role="img" aria-label="Skills vs rules vs tools comparison">
  <rect width="960" height="460" fill="#0f172a"/>
  <text x="480" y="42" text-anchor="middle" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Skills vs rules vs tools</text>
  <text x="480" y="70" text-anchor="middle" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13">Same agent stack, different jobs</text>

  <rect x="40" y="100" width="280" height="320" rx="14" fill="#1e293b" stroke="#38bdf8"/>
  <text x="180" y="145" text-anchor="middle" fill="#38bdf8" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Rules</text>
  <text x="180" y="185" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="14">Always-on guidance</text>
  <text x="60" y="230" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13">- coding standards</text>
  <text x="60" y="255" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13">- project conventions</text>
  <text x="60" y="280" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13">- file-scoped policies</text>
  <text x="60" y="320" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="13">When: every relevant turn</text>
  <text x="60" y="360" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="12">.cursor/rules/*.mdc</text>

  <rect x="340" y="100" width="280" height="320" rx="14" fill="#1e293b" stroke="#a78bfa"/>
  <text x="480" y="145" text-anchor="middle" fill="#a78bfa" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Skills</text>
  <text x="480" y="185" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="14">On-demand playbooks</text>
  <text x="360" y="230" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13">- specialized workflows</text>
  <text x="360" y="255" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13">- domain procedures</text>
  <text x="360" y="280" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13">- templates + scripts</text>
  <text x="360" y="320" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="13">When: task matches skill</text>
  <text x="360" y="360" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="12">*/skills/*/SKILL.md</text>

  <rect x="640" y="100" width="280" height="320" rx="14" fill="#1e293b" stroke="#22c55e"/>
  <text x="780" y="145" text-anchor="middle" fill="#22c55e" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Tools</text>
  <text x="780" y="185" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="14">Executable actions</text>
  <text x="660" y="230" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13">- read / edit / shell</text>
  <text x="660" y="255" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13">- search / browser</text>
  <text x="660" y="280" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13">- MCP / APIs</text>
  <text x="660" y="320" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="13">When: agent needs to act</text>
  <text x="660" y="360" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="12">runtime function calls</text>
</svg>
