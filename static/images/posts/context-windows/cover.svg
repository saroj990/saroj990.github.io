<svg xmlns="http://www.w3.org/2000/svg" width="960" height="400" viewBox="0 0 960 400" role="img" aria-label="Context window as a fixed-size slot that fills with tokens">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="fill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="70%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="960" height="400" fill="url(#bg)"/>
  <text x="480" y="58" text-anchor="middle" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">The Context Window</text>
  <text x="480" y="92" text-anchor="middle" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="15">Everything the model can see in one request - and nothing beyond it</text>

  <rect x="80" y="140" width="800" height="120" rx="14" fill="#0b1220" stroke="#334155" stroke-width="2"/>
  <rect x="96" y="156" width="560" height="88" rx="8" fill="url(#fill)" opacity="0.9"/>
  <rect x="664" y="156" width="200" height="88" rx="8" fill="#1e293b" stroke="#64748b" stroke-dasharray="6 4"/>

  <text x="376" y="208" text-anchor="middle" fill="#0f172a" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Tokens in use</text>
  <text x="764" y="208" text-anchor="middle" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="14">Headroom</text>

  <text x="96" y="300" fill="#38bdf8" font-family="Arial, Helvetica, sans-serif" font-size="13">system + history + tools + your prompt + model reply</text>
  <text x="96" y="330" fill="#f59e0b" font-family="Arial, Helvetica, sans-serif" font-size="14">When the slot is full, something has to leave - or never enter.</text>
</svg>
