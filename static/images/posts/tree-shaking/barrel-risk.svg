<svg xmlns="http://www.w3.org/2000/svg" width="960" height="380" viewBox="0 0 960 380">
  <rect width="960" height="380" fill="#0f1324"/>
  <text x="480" y="36" text-anchor="middle" fill="#e8ecff" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Barrel Files Can Block Shaking</text>
  <rect x="40" y="70" width="420" height="250" rx="12" fill="#1f1418" stroke="#7f1d1d" stroke-width="2"/>
  <text x="250" y="105" text-anchor="middle" fill="#fca5a5" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">Risky barrel</text>
  <text x="250" y="145" text-anchor="middle" fill="#fecaca" font-family="Arial, Helvetica, sans-serif" font-size="12">index.js re-exports everything</text>
  <text x="250" y="175" text-anchor="middle" fill="#fecaca" font-family="Arial, Helvetica, sans-serif" font-size="12">+ CSS imported at top level</text>
  <text x="250" y="205" text-anchor="middle" fill="#fecaca" font-family="Arial, Helvetica, sans-serif" font-size="12">+ CJS interop leftovers</text>
  <text x="250" y="250" text-anchor="middle" fill="#f87171" font-family="Arial, Helvetica, sans-serif" font-size="13">Bundler may keep the graph</text>
  <rect x="500" y="70" width="420" height="250" rx="12" fill="#101f18" stroke="#166534" stroke-width="2"/>
  <text x="710" y="105" text-anchor="middle" fill="#86efac" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700">Shake-friendly design</text>
  <text x="710" y="145" text-anchor="middle" fill="#bbf7d0" font-family="Arial, Helvetica, sans-serif" font-size="12">ESM-only entry points</text>
  <text x="710" y="175" text-anchor="middle" fill="#bbf7d0" font-family="Arial, Helvetica, sans-serif" font-size="12">sideEffects: false (or precise)</text>
  <text x="710" y="205" text-anchor="middle" fill="#bbf7d0" font-family="Arial, Helvetica, sans-serif" font-size="12">Deep imports or clean exports</text>
  <text x="710" y="250" text-anchor="middle" fill="#4ade80" font-family="Arial, Helvetica, sans-serif" font-size="13">Unused components can drop</text>
</svg>
