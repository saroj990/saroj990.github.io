<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-label="Ollama terminal session">
  <rect width="960" height="540" rx="14" fill="#0d1117" stroke="#30363d" stroke-width="2"/>
  <rect width="960" height="36" rx="14" fill="#21262d"/>
  <rect y="20" width="960" height="16" fill="#21262d"/>
  <circle cx="24" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="44" cy="18" r="6" fill="#febc2e"/>
  <circle cx="64" cy="18" r="6" fill="#28c840"/>
  <text x="480" y="23" text-anchor="middle" fill="#8b949e" font-family="ui-monospace,Menlo,monospace" font-size="12">Terminal - ollama</text>
  <text x="36" y="72" fill="#8b949e" font-family="ui-monospace,Menlo,monospace" font-size="15">$</text>
  <text x="52" y="72" fill="#e6edf3" font-family="ui-monospace,Menlo,monospace" font-size="15">ollama pull qwen3:8b</text>
  <text x="36" y="102" fill="#3fb950" font-family="ui-monospace,Menlo,monospace" font-size="14">pulling manifest</text>
  <text x="36" y="128" fill="#3fb950" font-family="ui-monospace,Menlo,monospace" font-size="14">downloading 4.7 GB... 100%</text>
  <text x="36" y="164" fill="#8b949e" font-family="ui-monospace,Menlo,monospace" font-size="15">$</text>
  <text x="52" y="164" fill="#e6edf3" font-family="ui-monospace,Menlo,monospace" font-size="15">ollama run qwen3:8b</text>
  <text x="36" y="200" fill="#79c0ff" font-family="ui-monospace,Menlo,monospace" font-size="14">&gt;&gt;&gt; Send a message (/? for help)</text>
  <text x="36" y="236" fill="#e6edf3" font-family="ui-monospace,Menlo,monospace" font-size="14">Explain mutex vs semaphore</text>
  <text x="36" y="272" fill="#d2a8ff" font-family="ui-monospace,Menlo,monospace" font-size="14">A mutex allows one thread at a time. A semaphore</text>
  <text x="36" y="296" fill="#d2a8ff" font-family="ui-monospace,Menlo,monospace" font-size="14">controls access with a counter for multiple slots...</text>
  <rect x="36" y="330" width="888" height="1" fill="#30363d"/>
  <text x="36" y="360" fill="#8b949e" font-family="ui-monospace,Menlo,monospace" font-size="13">API server running on http://localhost:11434</text>
  <text x="36" y="386" fill="#8b949e" font-family="ui-monospace,Menlo,monospace" font-size="13">OpenAI-compatible endpoint: /v1/chat/completions</text>
</svg>
