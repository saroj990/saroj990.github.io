<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280" role="img" aria-label="Text to tokens flow">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6b8afd"/>
    </marker>
  </defs>
  <rect width="900" height="280" fill="#0f1324"/>
  <text x="450" y="35" text-anchor="middle" fill="#e8ecff" font-family="system-ui,sans-serif" font-size="18" font-weight="600">From Prompt to Token IDs</text>
  <rect x="40" y="70" width="180" height="80" rx="10" fill="#1a2548" stroke="#6b8afd"/>
  <text x="130" y="105" text-anchor="middle" fill="#e8ecff" font-size="14">"river bank"</text>
  <text x="130" y="128" text-anchor="middle" fill="#9aa8d8" font-size="11">raw text prompt</text>
  <line x1="220" y1="110" x2="270" y2="110" stroke="#6b8afd" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="270" y="70" width="180" height="80" rx="10" fill="#16213e" stroke="#4ecdc4"/>
  <text x="360" y="105" text-anchor="middle" fill="#e8ecff" font-size="14">Tokenizer</text>
  <text x="360" y="128" text-anchor="middle" fill="#9aa8d8" font-size="11">splits into chunks</text>
  <line x1="450" y1="110" x2="500" y2="110" stroke="#6b8afd" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="500" y="70" width="360" height="80" rx="10" fill="#1a2548" stroke="#6b8afd"/>
  <text x="680" y="100" text-anchor="middle" fill="#e8ecff" font-size="13">["river", " bank"] ’ [4521, 8932]</text>
  <text x="680" y="125" text-anchor="middle" fill="#9aa8d8" font-size="11">tokens ’ integer IDs the model reads</text>
  <text x="450" y="210" text-anchor="middle" fill="#8b97c7" font-size="13">LLMs never see words directly  they operate on token sequences</text>
</svg>
