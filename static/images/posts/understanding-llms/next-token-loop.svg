<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320" role="img" aria-label="Next token prediction loop">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6b8afd"/>
    </marker>
  </defs>
  <rect width="900" height="320" fill="#0f1324"/>
  <text x="450" y="35" text-anchor="middle" fill="#e8ecff" font-family="system-ui,sans-serif" font-size="18" font-weight="600">Autoregressive Generation (Next-Token Prediction)</text>
  <rect x="60" y="70" width="160" height="60" rx="8" fill="#1a2548" stroke="#6b8afd"/>
  <text x="140" y="105" text-anchor="middle" fill="#e8ecff" font-size="13">Input tokens</text>
  <line x1="220" y1="100" x2="280" y2="100" stroke="#6b8afd" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="280" y="60" width="160" height="80" rx="8" fill="#16213e" stroke="#4ecdc4"/>
  <text x="360" y="95" text-anchor="middle" fill="#e8ecff" font-size="13">Transformer</text>
  <text x="360" y="115" text-anchor="middle" fill="#9aa8d8" font-size="11">predicts next token</text>
  <line x1="440" y1="100" x2="500" y2="100" stroke="#6b8afd" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="500" y="70" width="200" height="60" rx="8" fill="#1a2548" stroke="#6b8afd"/>
  <text x="600" y="105" text-anchor="middle" fill="#e8ecff" font-size="13">Sample token</text>
  <line x1="600" y1="130" x2="600" y2="180" stroke="#6b8afd" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="500" y="180" width="200" height="60" rx="8" fill="#1a2548" stroke="#6b8afd"/>
  <text x="600" y="215" text-anchor="middle" fill="#e8ecff" font-size="13">Append to sequence</text>
  <path d="M500 210 H200 V100 H60" fill="none" stroke="#4ecdc4" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
  <text x="300" y="250" text-anchor="middle" fill="#8b97c7" font-size="12">Repeat until stop token or max length</text>
  <text x="750" y="100" fill="#9aa8d8" font-size="12">Temperature</text>
  <text x="750" y="120" fill="#9aa8d8" font-size="12">and top-p control</text>
  <text x="750" y="140" fill="#9aa8d8" font-size="12">randomness here</text>
</svg>
