  <text x="160" y="135" text-anchor="middle" fill="#9aa8d8" font-size="12">OpenAI-compatible client</text>
  <line x1="260" y1="115" x2="330" y2="115" stroke="#6b8afd" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="330" y="70" width="300" height="90" rx="10" fill="#16213e" stroke="#4ecdc4" stroke-width="2"/>
  <text x="480" y="105" text-anchor="middle" fill="#e8ecff" font-size="15" font-weight="600">Local Runtime</text>
  <text x="480" y="128" text-anchor="middle" fill="#9aa8d8" font-size="12">Ollama (:11434) or LM Studio (:1234)</text>
  <line x1="630" y1="115" x2="700" y2="115" stroke="#6b8afd" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="700" y="80" width="200" height="70" rx="10" fill="#1a2548" stroke="#6b8afd" stroke-width="2"/>
  <text x="800" y="115" text-anchor="middle" fill="#e8ecff" font-size="15" font-weight="600">GGUF Model</text>
