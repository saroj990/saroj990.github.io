  </defs>
  <rect width="960" height="400" fill="url(#bg)"/>
  <text x="480" y="40" text-anchor="middle" fill="#e8ecff" font-family="system-ui,sans-serif" font-size="22" font-weight="600">Running LLMs Locally</text>
  <rect x="60" y="80" width="200" height="70" rx="10" fill="#1a2548" stroke="#6b8afd" stroke-width="2"/>
