<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280" role="img" aria-label="Quantization reduces model memory">
  <rect width="900" height="280" fill="#0f1324"/>
  <text x="450" y="36" text-anchor="middle" fill="#e8ecff" font-family="system-ui,sans-serif" font-size="18" font-weight="600">7B Model Memory: FP16 vs Q4_K_M</text>
  <rect x="80" y="70" width="300" height="120" rx="10" fill="#2d1f1f" stroke="#ef4444" stroke-width="2"/>
  <text x="230" y="110" text-anchor="middle" fill="#fecaca" font-size="16" font-weight="600">FP16 (full precision)</text>
  <text x="230" y="145" text-anchor="middle" fill="#fca5a5" font-size="28" font-weight="700">~28 GB</text>
  <text x="230" y="172" text-anchor="middle" fill="#f87171" font-size="12">4 bytes x 7B parameters</text>
  <rect x="520" y="70" width="300" height="120" rx="10" fill="#14291f" stroke="#22c55e" stroke-width="2"/>
  <text x="670" y="110" text-anchor="middle" fill="#bbf7d0" font-size="16" font-weight="600">Q4_K_M (quantized)</text>
  <text x="670" y="145" text-anchor="middle" fill="#86efac" font-size="28" font-weight="700">~5 GB</text>
  <text x="670" y="172" text-anchor="middle" fill="#4ade80" font-size="12">4-bit weights, small quality loss</text>
  <text x="450" y="240" text-anchor="middle" fill="#8b97c7" font-size="13">Quantization makes 7B-8B models practical on 16 GB laptops</text>
</svg>
