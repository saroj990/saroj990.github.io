<svg xmlns="http://www.w3.org/2000/svg" width="960" height="340" viewBox="0 0 960 340">
  <rect width="960" height="340" fill="#0f1324"/>
  <text x="480" y="36" text-anchor="middle" fill="#e8ecff" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Task Graph + Caching</text>
  <rect x="80" y="80" width="140" height="60" rx="8" fill="#1a2548" stroke="#6b8afd" stroke-width="2"/>
  <text x="150" y="115" text-anchor="middle" fill="#e8ecff" font-family="Arial, Helvetica, sans-serif" font-size="13">lint ui</text>
  <rect x="280" y="80" width="140" height="60" rx="8" fill="#1a2548" stroke="#6b8afd" stroke-width="2"/>
  <text x="350" y="115" text-anchor="middle" fill="#e8ecff" font-family="Arial, Helvetica, sans-serif" font-size="13">build ui</text>
  <rect x="480" y="80" width="140" height="60" rx="8" fill="#16213e" stroke="#4ecdc4" stroke-width="2"/>
  <text x="550" y="115" text-anchor="middle" fill="#e8ecff" font-family="Arial, Helvetica, sans-serif" font-size="13">build web</text>
  <rect x="680" y="80" width="160" height="60" rx="8" fill="#14291f" stroke="#22c55e" stroke-width="2"/>
  <text x="760" y="115" text-anchor="middle" fill="#bbf7d0" font-family="Arial, Helvetica, sans-serif" font-size="13">test web</text>
  <line x1="220" y1="110" x2="280" y2="110" stroke="#6b8afd" stroke-width="2"/>
  <line x1="420" y1="110" x2="480" y2="110" stroke="#6b8afd" stroke-width="2"/>
  <line x1="620" y1="110" x2="680" y2="110" stroke="#6b8afd" stroke-width="2"/>
  <rect x="120" y="190" width="720" height="100" rx="12" fill="#121a33" stroke="#3d4f8a" stroke-width="2"/>
  <text x="480" y="230" text-anchor="middle" fill="#b8c4f0" font-family="Arial, Helvetica, sans-serif" font-size="14">If inputs for build ui are unchanged, reuse cache and skip rebuild</text>
  <text x="480" y="260" text-anchor="middle" fill="#8b97c7" font-family="Arial, Helvetica, sans-serif" font-size="13">Affected commands run only what depends on changed packages</text>
</svg>
