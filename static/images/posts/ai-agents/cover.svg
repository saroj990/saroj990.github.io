<svg xmlns="http://www.w3.org/2000/svg" width="960" height="400" viewBox="0 0 960 400">
  <rect width="960" height="400" fill="#0f1324"/>
  <text x="480" y="36" text-anchor="middle" fill="#e8ecff" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Chatbot vs AI Agent</text>
  <rect x="40" y="70" width="420" height="280" rx="12" fill="#1f1418" stroke="#7f1d1d" stroke-width="2"/>
  <text x="250" y="105" text-anchor="middle" fill="#fca5a5" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Chatbot / Assistant</text>
  <text x="250" y="145" text-anchor="middle" fill="#fecaca" font-family="Arial, Helvetica, sans-serif" font-size="13">User prompt</text>
  <line x1="250" y1="155" x2="250" y2="185" stroke="#ef4444" stroke-width="2"/>
  <rect x="150" y="185" width="200" height="50" rx="8" fill="#2d1f1f" stroke="#ef4444" stroke-width="2"/>
  <text x="250" y="215" text-anchor="middle" fill="#fecaca" font-family="Arial, Helvetica, sans-serif" font-size="13">LLM generates text</text>
  <line x1="250" y1="235" x2="250" y2="265" stroke="#ef4444" stroke-width="2"/>
  <text x="250" y="290" text-anchor="middle" fill="#fecaca" font-family="Arial, Helvetica, sans-serif" font-size="13">Response ends</text>
  <text x="250" y="320" text-anchor="middle" fill="#f87171" font-family="Arial, Helvetica, sans-serif" font-size="12">One-shot answer, no tools</text>
  <rect x="500" y="70" width="420" height="280" rx="12" fill="#101f18" stroke="#166534" stroke-width="2"/>
  <text x="710" y="105" text-anchor="middle" fill="#86efac" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">AI Agent</text>
  <text x="710" y="145" text-anchor="middle" fill="#bbf7d0" font-family="Arial, Helvetica, sans-serif" font-size="13">Goal</text>
  <line x1="710" y1="155" x2="710" y2="180" stroke="#22c55e" stroke-width="2"/>
  <rect x="600" y="180" width="220" height="40" rx="8" fill="#14291f" stroke="#22c55e" stroke-width="2"/>
  <text x="710" y="205" text-anchor="middle" fill="#bbf7d0" font-family="Arial, Helvetica, sans-serif" font-size="13">Plan - Act - Observe loop</text>
  <line x1="710" y1="220" x2="710" y2="245" stroke="#22c55e" stroke-width="2"/>
  <rect x="600" y="245" width="220" height="40" rx="8" fill="#14291f" stroke="#22c55e" stroke-width="2"/>
  <text x="710" y="270" text-anchor="middle" fill="#bbf7d0" font-family="Arial, Helvetica, sans-serif" font-size="13">Tools + memory + state</text>
  <text x="710" y="320" text-anchor="middle" fill="#4ade80" font-family="Arial, Helvetica, sans-serif" font-size="12">Keeps going until goal is met</text>
</svg>
