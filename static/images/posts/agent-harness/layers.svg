<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500" role="img" aria-label="Harness layers around the model">
  <rect width="960" height="500" fill="#0f172a"/>
  <text x="480" y="44" text-anchor="middle" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">What lives in the harness</text>
  <text x="480" y="76" text-anchor="middle" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="16">Everything that is not the model weights</text>

  <rect x="40" y="110" width="210" height="160" rx="12" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <text x="145" y="160" text-anchor="middle" fill="#38bdf8" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Guides</text>
  <text x="145" y="200" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="15">prompts, rules,</text>
  <text x="145" y="225" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="15">skills, policies</text>

  <rect x="270" y="110" width="210" height="160" rx="12" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <text x="375" y="160" text-anchor="middle" fill="#22c55e" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Actuators</text>
  <text x="375" y="200" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="15">tools, MCP, shell,</text>
  <text x="375" y="225" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="15">browser, APIs</text>

  <rect x="500" y="110" width="210" height="160" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="605" y="160" text-anchor="middle" fill="#f59e0b" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Sensors</text>
  <text x="605" y="200" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="15">tests, linters,</text>
  <text x="605" y="225" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="15">evals, parsers</text>

  <rect x="730" y="110" width="190" height="160" rx="12" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="825" y="160" text-anchor="middle" fill="#a78bfa" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Control</text>
  <text x="825" y="200" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="15">loop, budgets,</text>
  <text x="825" y="225" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="15">approvals, hooks</text>

  <rect x="40" y="300" width="880" height="160" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <text x="60" y="350" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Plus: context pipelines, memory, sandbox, observability</text>
  <text x="60" y="390" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="16">Harness engineering designs these pieces so average models become useful</text>
  <text x="60" y="420" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="16">and strong models stay controllable in production.</text>
</svg>
