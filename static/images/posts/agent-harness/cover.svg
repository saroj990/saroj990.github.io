<svg xmlns="http://www.w3.org/2000/svg" width="960" height="400" viewBox="0 0 960 400" role="img" aria-label="Agent equals model plus harness">
  <rect width="960" height="400" fill="#0f172a"/>
  <text x="480" y="48" text-anchor="middle" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">Agent = Model + Harness</text>
  <text x="480" y="78" text-anchor="middle" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="14">The model reasons. The harness makes work finish safely.</text>

  <rect x="80" y="130" width="220" height="200" rx="14" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="190" y="190" text-anchor="middle" fill="#a78bfa" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Model</text>
  <text x="190" y="230" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="13">tokens in / out</text>
  <text x="190" y="255" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="13">proposes actions</text>
  <text x="190" y="280" text-anchor="middle" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12">not an agent alone</text>

  <text x="340" y="240" text-anchor="middle" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">+</text>

  <rect x="380" y="130" width="220" height="200" rx="14" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <text x="490" y="190" text-anchor="middle" fill="#38bdf8" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Harness</text>
  <text x="490" y="230" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="13">tools, loop, memory</text>
  <text x="490" y="255" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="13">sandbox, sensors</text>
  <text x="490" y="280" text-anchor="middle" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12">your engineering</text>

  <text x="640" y="240" text-anchor="middle" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">=</text>

  <rect x="680" y="130" width="200" height="200" rx="14" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <text x="780" y="210" text-anchor="middle" fill="#22c55e" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Agent</text>
  <text x="780" y="250" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="13">reliable work</text>
  <text x="780" y="275" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="13">in the real world</text>
</svg>
