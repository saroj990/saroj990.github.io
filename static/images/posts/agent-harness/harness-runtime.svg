<svg xmlns="http://www.w3.org/2000/svg" width="960" height="620" viewBox="0 0 960 620" role="img" aria-label="User goal flows through the agent harness to the model and environment">
  <rect width="960" height="620" fill="#0f172a"/>
  <text x="480" y="42" text-anchor="middle" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Harness as the runtime layer</text>
  <text x="480" y="70" text-anchor="middle" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="15">User goal in - actions out - results back into context</text>

  <!-- User goal -->
  <rect x="330" y="95" width="300" height="52" rx="10" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <text x="480" y="128" text-anchor="middle" fill="#38bdf8" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">User goal</text>

  <line x1="480" y1="147" x2="480" y2="175" stroke="#64748b" stroke-width="2"/>
  <polygon points="480,180 474,168 486,168" fill="#64748b"/>

  <!-- Harness container -->
  <rect x="50" y="180" width="860" height="280" rx="14" fill="#111827" stroke="#475569" stroke-width="2"/>
  <text x="70" y="210" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Agent harness</text>

  <!-- Row 1 inside harness -->
  <rect x="80" y="230" width="180" height="80" rx="10" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <text x="170" y="265" text-anchor="middle" fill="#38bdf8" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">Guides</text>
  <text x="170" y="290" text-anchor="middle" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13">prompts, rules, skills</text>

  <rect x="290" y="230" width="180" height="80" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <text x="380" y="265" text-anchor="middle" fill="#22c55e" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">Context</text>
  <text x="380" y="290" text-anchor="middle" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13">pipeline</text>

  <rect x="500" y="230" width="180" height="80" rx="10" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="590" y="265" text-anchor="middle" fill="#a78bfa" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">Loop</text>
  <text x="590" y="290" text-anchor="middle" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13">orchestration</text>

  <rect x="710" y="230" width="170" height="80" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="795" y="265" text-anchor="middle" fill="#f59e0b" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">Tools</text>
  <text x="795" y="290" text-anchor="middle" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13">runtime</text>

  <!-- Row 2 -->
  <rect x="200" y="340" width="220" height="80" rx="10" fill="#1e293b" stroke="#f43f5e" stroke-width="2"/>
  <text x="310" y="375" text-anchor="middle" fill="#f43f5e" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">Sensors</text>
  <text x="310" y="400" text-anchor="middle" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13">tests, evals, hooks</text>

  <rect x="480" y="340" width="220" height="80" rx="10" fill="#1e293b" stroke="#2dd4bf" stroke-width="2"/>
  <text x="590" y="375" text-anchor="middle" fill="#2dd4bf" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">Memory</text>
  <text x="590" y="400" text-anchor="middle" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="13">state and transcript</text>

  <!-- Arrow down from harness -->
  <line x1="480" y1="460" x2="480" y2="488" stroke="#64748b" stroke-width="2"/>
  <polygon points="480,493 474,481 486,481" fill="#64748b"/>

  <!-- Model and Environment -->
  <rect x="90" y="500" width="340" height="80" rx="12" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="260" y="535" text-anchor="middle" fill="#a78bfa" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Model (LLM)</text>
  <text x="260" y="560" text-anchor="middle" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="14">proposes the next action</text>

  <rect x="530" y="500" width="340" height="80" rx="12" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <text x="700" y="535" text-anchor="middle" fill="#22c55e" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Environment</text>
  <text x="700" y="560" text-anchor="middle" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="14">repo, shell, browser, APIs</text>
</svg>
