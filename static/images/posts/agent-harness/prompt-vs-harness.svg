<svg xmlns="http://www.w3.org/2000/svg" width="960" height="400" viewBox="0 0 960 400" role="img" aria-label="Prompt engineering vs harness engineering">
  <rect width="960" height="400" fill="#0f172a"/>
  <text x="480" y="42" text-anchor="middle" fill="#e2e8f0" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Prompt engineering vs harness engineering</text>

  <rect x="50" y="90" width="400" height="260" rx="14" fill="#1e293b" stroke="#64748b"/>
  <text x="250" y="140" text-anchor="middle" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Prompt engineering</text>
  <text x="250" y="185" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="13">Shape one interaction</text>
  <text x="250" y="215" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="13">Better wording / few-shots</text>
  <text x="250" y="245" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="13">Model-centric</text>
  <text x="250" y="290" text-anchor="middle" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="12">Necessary, not sufficient</text>

  <rect x="510" y="90" width="400" height="260" rx="14" fill="#1e293b" stroke="#38bdf8"/>
  <text x="710" y="140" text-anchor="middle" fill="#38bdf8" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Harness engineering</text>
  <text x="710" y="185" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="13">Shape the whole runtime</text>
  <text x="710" y="215" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="13">Tools, sensors, sandboxes</text>
  <text x="710" y="245" text-anchor="middle" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="13">System-centric</text>
  <text x="710" y="290" text-anchor="middle" fill="#38bdf8" font-family="Arial, Helvetica, sans-serif" font-size="12">Where production value lives</text>
</svg>
