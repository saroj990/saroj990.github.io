<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280" role="img" aria-label="Text to tokens flow">
  <rect width="900" height="280" fill="#0f1324"/>
  <text x="450" y="36" text-anchor="middle" fill="#e8ecff" font-family="system-ui,sans-serif" font-size="18" font-weight="600">From Prompt to Token IDs</text>
  <rect x="40" y="70" width="180" height="80" rx="10" fill="#1a2548" stroke="#6b8afd" stroke-width="2"/>
  <text x="130" y="105" text-anchor="middle" fill="#e8ecff" font-size="14">"river bank"</text>
  <text x="130" y="128" text-anchor="middle" fill="#9aa8d8" font-size="11">raw text prompt</text>
  <line x1="220" y1="110" x2="270" y2="110" stroke="#6b8afd" stroke-width="2"/>
  <polygon points="270,110 260,104 260,116" fill="#6b8afd"/>
  <rect x="280" y="70" width="180" height="80" rx="10" fill="#16213e" stroke="#4ecdc4" stroke-width="2"/>
  <text x="370" y="105" text-anchor="middle" fill="#e8ecff" font-size="14">Tokenizer</text>
  <text x="370" y="128" text-anchor="middle" fill="#9aa8d8" font-size="11">splits into chunks</text>
  <line x1="460" y1="110" x2="510" y2="110" stroke="#6b8afd" stroke-width="2"/>
  <polygon points="510,110 500,104 500,116" fill="#6b8afd"/>
  <rect x="520" y="70" width="340" height="80" rx="10" fill="#1a2548" stroke="#6b8afd" stroke-width="2"/>
  <text x="690" y="100" text-anchor="middle" fill="#e8ecff" font-size="13">["river", " bank"] -&gt; [4521, 8932]</text>
  <text x="690" y="125" text-anchor="middle" fill="#9aa8d8" font-size="11">tokens become integer IDs</text>
  <text x="450" y="220" text-anchor="middle" fill="#8b97c7" font-size="13">LLMs never see words directly - they operate on token sequences</text>
</svg>
