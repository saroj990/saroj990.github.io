  <text x="240" y="262" text-anchor="middle" fill="#f87171" font-size="11">Pay per token - data leaves machine</text>
  <rect x="540" y="70" width="360" height="280" rx="12" fill="#101f18" stroke="#166534" stroke-width="2"/>
