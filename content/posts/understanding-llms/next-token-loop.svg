<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320" role="img" aria-label="Next token prediction loop">
  <rect width="900" height="320" fill="#0f1324"/>
  <text x="450" y="36" text-anchor="middle" fill="#e8ecff" font-family="system-ui,sans-serif" font-size="18" font-weight="600">Autoregressive Generation</text>
  <rect x="60" y="80" width="160" height="60" rx="8" fill="#1a2548" stroke="#6b8afd" stroke-width="2"/>
  <text x="140" y="115" text-anchor="middle" fill="#e8ecff" font-size="13">Input tokens</text>
  <line x1="220" y1="110" x2="280" y2="110" stroke="#6b8afd" stroke-width="2"/>
  <polygon points="280,110 270,104 270,116" fill="#6b8afd"/>
  <rect x="290" y="70" width="160" height="80" rx="8" fill="#16213e" stroke="#4ecdc4" stroke-width="2"/>
  <text x="370" y="105" text-anchor="middle" fill="#e8ecff" font-size="13">Transformer</text>
  <text x="370" y="125" text-anchor="middle" fill="#9aa8d8" font-size="11">predict next token</text>
  <line x1="450" y1="110" x2="510" y2="110" stroke="#6b8afd" stroke-width="2"/>
  <polygon points="510,110 500,104 500,116" fill="#6b8afd"/>
  <rect x="520" y="80" width="180" height="60" rx="8" fill="#1a2548" stroke="#6b8afd" stroke-width="2"/>
  <text x="610" y="115" text-anchor="middle" fill="#e8ecff" font-size="13">Sample token</text>
  <line x1="610" y1="140" x2="610" y2="185" stroke="#6b8afd" stroke-width="2"/>
  <polygon points="610,185 604,175 616,175" fill="#6b8afd"/>
  <rect x="520" y="190" width="180" height="60" rx="8" fill="#1a2548" stroke="#6b8afd" stroke-width="2"/>
  <text x="610" y="225" text-anchor="middle" fill="#e8ecff" font-size="13">Append to sequence</text>
  <path d="M520 220 H200 V110 H60" fill="none" stroke="#4ecdc4" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="300" y="270" text-anchor="middle" fill="#8b97c7" font-size="12">Repeat until stop token or max length</text>
  <text x="760" y="100" fill="#9aa8d8" font-size="12">Temperature</text>
  <text x="760" y="120" fill="#9aa8d8" font-size="12">and top-p control</text>
  <text x="760" y="140" fill="#9aa8d8" font-size="12">randomness here</text>
</svg>
